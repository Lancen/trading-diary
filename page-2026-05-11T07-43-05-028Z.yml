                - listitem [ref=e81]:
                  - code [ref=e82]: Constitution
                  - text: 看起来"像一段背景说明"。
                - listitem [ref=e83]: 好像写不写，对能不能生成代码影响不大。
              - paragraph [ref=e84]: 直到你真的用了一段时间，才会发现：
              - blockquote [ref=e85]:
                - paragraph [ref=e86]:
                  - strong [ref=e87]:
                    - code [ref=e88]: Specify
                    - text: 写得再认真，只要
                    - code [ref=e89]: Constitution
                    - text: 没想清楚，后面每一步都会反复摇摆。
              - separator [ref=e90]
              - heading "二、第一次写 Constitution，我写得非常\"敷衍\"" [level=2] [ref=e91]
              - paragraph [ref=e92]: 我第一次用 Spec-Kit 时，是这样操作的：
              - list [ref=e93]:
                - listitem [ref=e94]:
                  - text: 运行
                  - code [ref=e95]: specify init
                  - text: 。
                - listitem [ref=e96]:
                  - text: 看到有
                  - code [ref=e97]: /speckit.constitution
                  - text: 这个命令。
                - listitem [ref=e98]: 心想："那我在这个指令后面写一句话不就好了？"
              - paragraph [ref=e99]: 于是我写了类似这样的话：
              - paragraph [ref=e100]:
                - text: "\""
                - strong [ref=e101]: 本项目使用 TypeScript，追求高质量代码。
                - text: "\""
              - paragraph [ref=e102]: 写完的一瞬间，我自己就知道不对劲了。
              - paragraph [ref=e103]: 它的问题很明显：
              - list [ref=e104]:
                - listitem [ref=e105]:
                  - strong [ref=e106]: 太泛
                  - text: ：什么是"高质量"？没有定义。
                - listitem [ref=e107]:
                  - strong [ref=e108]: 太安全
                  - text: ：这是一句永远不会错的"废话"。
                - listitem [ref=e109]:
                  - strong [ref=e110]: 对 AI 几乎没有约束力
                  - text: ：AI 完全可以按照自己的理解去解释"高质量"。
              - paragraph [ref=e111]: 这不是宪法，更像 README 的第一句。
              - separator [ref=e112]
              - heading "三、第二次更\"认真\"，但方向彻底错了" [level=2] [ref=e113]
              - paragraph [ref=e114]: 后来我决定认真一点，于是做了另一件事：把能想到的所有规则都塞了进去。
              - list [ref=e115]:
                - listitem [ref=e116]:
                  - text: Cursor 里的
