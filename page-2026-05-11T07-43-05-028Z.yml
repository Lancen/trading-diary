              - paragraph [ref=e132]: 而是换成问：
              - blockquote [ref=e133]:
                - paragraph [ref=e134]:
                  - strong [ref=e135]: "\"当 AI、工具和我意见不一致时，到底该听谁的？\""
              - paragraph [ref=e136]: 比如：
              - list [ref=e137]:
                - listitem [ref=e138]: AI 为了快，想绕过类型系统。
                - listitem [ref=e139]: AI 为了省事，直接把逻辑写死，而不是做成可配置。
                - listitem [ref=e140]: AI 引入了第二套技术方案，看起来也说得通，但破坏了系统一致性。
                - listitem [ref=e141]: Spec-Kit 默认用英文输出，但团队其实更习惯中文沟通。
              - paragraph [ref=e142]:
                - text: 这些问题的共同点是，它们不是"怎么写更好"的
                - strong [ref=e143]: 实现问题
                - text: ，而是"这样做行不行"的
                - strong [ref=e144]: 原则问题
                - text: 。
              - paragraph [ref=e145]:
                - text: 这时候我才意识到，
                - code [ref=e146]: Constitution
                - text: 的核心角色有两个：
              - list [ref=e147]:
                - listitem [ref=e148]:
                  - strong [ref=e149]: 基石（Baseline）
                  - text: ：为项目定义一套所有参与者（包括 AI）都必须遵守的、不可动摇的质量和原则底线。
                - listitem [ref=e150]:
                  - strong [ref=e151]: 裁决者（Tie-Breaker）
                  - text: ：当出现模棱两可或冲突的情况时，为 AI 提供最高决策依据，告诉它应该"站哪一边"。
              - paragraph [ref=e152]: 它不是在教 AI 如何一笔一划地写代码，而是在设定整个项目的"价值观"和"行为准则"。
              - separator [ref=e153]
              - heading "五、一个更清晰的判断标准：区分\"What\"与\"How\"" [level=2] [ref=e154]
              - paragraph [ref=e155]:
                - text: 为了准确地区分什么该放进
                - code [ref=e156]: Constitution
                - text: ，我总结了一个更好用的标准：
                - strong [ref=e157]: 这条规则是在定义"我们追求什么（What）"，还是在定义"我们如何实现（How）"？
              - list [ref=e158]:
                - listitem [ref=e159]:
                  - strong [ref=e160]: 定义"What & Why"的规则
                  - text: ，应该进入
                  - code [ref=e161]: Constitution
                  - text: 。它们是关于目标的、原则性的、跨技术栈的，回答的是"我们的价值观是什么？"
                - listitem [ref=e162]:
                  - strong [ref=e163]: 定义"How"的规则
                  - text: ，则应该由具体的
                  - code [ref=e164]: rules
                  - text: 或配置文件管理。它们是关于实现的、工具性的，回答的是"我们用什么工具/方法来实现那个目标？"
              - paragraph [ref=e165]: 通过一个表格对比，会非常清楚：
