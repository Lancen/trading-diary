                - text: 的边界：它只关心那些最核心、最稳定、能够指导长期决策的原则。
              - separator [ref=e221]
              - heading "六、我最后整理出的 Constitution，刻意\"少写了很多东西\"" [level=2] [ref=e222]
              - paragraph [ref=e223]:
                - text: 最终，我将我的
                - code [ref=e224]: Constitution
                - text: 从"某个项目的规范"，抽象成了一份"通用的 AI 协作裁决协议"。
              - paragraph [ref=e225]:
                - text: 这份
                - code [ref=e226]: Constitution
                - text: 只关心三件事：
              - list [ref=e227]:
                - listitem [ref=e228]:
                  - strong [ref=e229]: 价值排序（Priorities）
                  - list [ref=e230]:
                    - listitem [ref=e231]: 类型安全 > 开发速度
                    - listitem [ref=e232]: 可维护性 > 一时便捷
                    - listitem [ref=e233]: 系统一致性 > 个人风格
                - listitem [ref=e234]:
                  - strong [ref=e235]: 不可谈判的边界（Non-Negotiables）
                  - list [ref=e236]:
                    - listitem [ref=e237]: 不能绕过类型系统。
                    - listitem [ref=e238]: 不能引入平行的技术体系（如在 React 项目中引入 Vue）。
                    - listitem [ref=e239]: 不可测试的代码视为不完整。
                - listitem [ref=e240]:
                  - strong [ref=e241]: 冲突时的取向（Defaults）
                  - list [ref=e242]:
                    - listitem [ref=e243]: 当工具默认语言与团队主语言冲突时，优先使用团队主语言（如中文）。
                    - listitem [ref=e244]: 当可配置性与硬编码有冲突时，优先选择可配置性。
              - paragraph [ref=e245]: 它刻意不关心：
