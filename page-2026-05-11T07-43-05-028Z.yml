              - paragraph [ref=e71]: 如果你按顺序来，每一步都很合理。
              - paragraph [ref=e72]: 但现实中，大多数人（包括我一开始）都会下意识地：
              - paragraph [ref=e73]:
                - strong [ref=e74]:
                  - text: 跳过
                  - code [ref=e75]: Constitution
