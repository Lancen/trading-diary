                - text: 这一步踩过的坑，以及我是如何慢慢理解其真正价值的。
              - separator [ref=e58]
              - heading "一、Spec-Kit 的流程本身没问题，问题在于你从哪开始" [level=2] [ref=e59]
              - paragraph [ref=e60]: Spec-Kit 的完整流程，其实是非常克制、也非常工程化的：
              - paragraph [ref=e61]:
                - code [ref=e62]: Constitution
                - text: →
                - code [ref=e63]: Specify
                - text: →
                - code [ref=e64]: Clarify
                - text: →
                - code [ref=e65]: Plan
                - text: →
                - code [ref=e66]: Tasks
                - text: →
                - code [ref=e67]: Analyze
                - text: →
