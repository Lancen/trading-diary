                  - generic [ref=e488]: "168"
                  - generic [ref=e489]: "169 ## X. 治理与修订"
                  - generic [ref=e490]: 170 **Governance（NON-NEGOTIABLE）**
                  - generic [ref=e491]: "171"
                  - generic [ref=e492]: "172 ### 宪法地位"
                  - generic [ref=e493]: 173 - 本宪法为最高治理协议
                  - generic [ref=e494]: 174 - 优先级高于所有 Rules、Guidelines 与工具约定
                  - generic [ref=e495]: "175"
                  - generic [ref=e496]: "176 ### 修订流程"
                  - generic [ref=e497]: 177 1. 提议：说明动机与影响范围
