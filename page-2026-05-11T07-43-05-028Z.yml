                    - cell "设定了代码可接受的最低标准，是\"What\"。" [ref=e187]
                  - row "一致性标准 所有API响应体必须使用 camelCase 是 确保了\"系统一致性\"，是关于代码形态的\"What\"。" [ref=e188]:
