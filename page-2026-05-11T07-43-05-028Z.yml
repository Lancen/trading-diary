                  - generic [ref=e321]: "1 # Universal AI-Driven Engineering Constitution"
                  - generic [ref=e322]: 2 **Constitution v1.3（Tool-Agnostic · Project-Agnostic）**
                  - generic [ref=e323]: "3"
                  - generic [ref=e324]:
                    - text: "4"
                    - generic [ref=e325]: "> **权威声明（Source of Truth）**"
                  - generic [ref=e326]: 5 > 本文件定义 AI 与人类在软件工程中的协作治理原则，
                  - generic [ref=e327]: 6 > 是所有基于 spec-kit 或等价规范驱动流程的项目的
                  - generic [ref=e328]:
                    - text: "7"
                    - generic [ref=e329]: "> **最高裁决协议（Single Source of Truth）**。"
                  - generic [ref=e330]: 8 >
                  - text: 9 > 当效率、工具默认行为、个人偏好与本宪法发生冲突时，
                  - generic [ref=e331]:
                    - text: "10"
                    - generic [ref=e332]: "> **以本宪法为最高优先级**。"
                  - generic [ref=e333]: "11"
                  - text: 12 ---
                  - generic [ref=e334]: "13"
                  - generic [ref=e335]: "14 ## I. 类型优先，安全第一"
                  - generic [ref=e336]: 15 **Type-First, Safety-First（NON-NEGOTIABLE）**
                  - generic [ref=e337]: "16"
                  - generic [ref=e338]: "17 ### 裁决原则"
                  - generic [ref=e339]: 18 - 类型安全 **优先于** 开发速度
                  - generic [ref=e340]: 19 - 编译期确定性 **优先于** 运行时容错
                  - generic [ref=e341]: 20 - 明确约束 **优先于** 模糊灵活
                  - generic [ref=e342]: "21"
                  - generic [ref=e343]: "22 ### 不可违背的边界"
                  - generic [ref=e344]: 23 - 所有可类型化系统必须启用严格类型检查
                  - generic [ref=e345]: "24 - 不允许绕过类型系统规避问题（如 `any`、隐式弱类型）"
                  - generic [ref=e346]: 25 - 所有对外边界（API、模块、组件、状态）必须具备明确契约
                  - generic [ref=e347]: "26"
                  - generic [ref=e348]:
                    - text: "27"
                    - generic [ref=e349]: "> **裁决说明**："
                  - generic [ref=e350]: 28 > 当“先跑起来”和“类型完整性”发生冲突时，必须选择后者。
                  - generic [ref=e351]: "29"
                  - text: 30 ---
                  - generic [ref=e352]: "31"
                  - generic [ref=e353]: "32 ## II. 配置驱动，组合优先"
                  - generic [ref=e354]: 33 **Configuration-Driven, Composition-First（NON-NEGOTIABLE）**
                  - generic [ref=e355]: "34"
                  - generic [ref=e356]: "35 ### 裁决原则"
                  - generic [ref=e357]: 36 - 组合优于继承
                  - generic [ref=e358]: 37 - 声明式优于命令式
                  - generic [ref=e359]: 38 - 配置优于硬编码
                  - generic [ref=e360]: "39"
                  - generic [ref=e361]: "40 ### 不可违背的边界"
                  - generic [ref=e362]: 41 - 业务能力必须通过组合式抽象构建
                  - generic [ref=e363]: 42 - 系统行为应可通过配置表达
                  - generic [ref=e364]: 43 - 禁止将核心业务规则硬编码进表现层或入口逻辑
                  - generic [ref=e365]: "44"
                  - generic [ref=e366]:
                    - text: "45"
                    - generic [ref=e367]: "> **裁决说明**："
                  - generic [ref=e368]: 46 > 当“快速写死逻辑”和“可组合、可配置”发生冲突时，必须选择后者。
                  - generic [ref=e369]: "47"
                  - text: 48 ---
                  - generic [ref=e370]: "49"
                  - generic [ref=e371]: "50 ## III. 语义清晰，体系一致"
                  - generic [ref=e372]: 51 **Semantic Clarity, System Consistency（NON-NEGOTIABLE）**
                  - generic [ref=e373]: "52"
                  - generic [ref=e374]: "53 ### 裁决原则"
                  - generic [ref=e375]: 54 - 可读性优先于技巧性
                  - generic [ref=e376]: 55 - 一致性优先于个人风格
                  - generic [ref=e377]: 56 - 语义优先于实现细节
                  - generic [ref=e378]: "57"
                  - generic [ref=e379]: "58 ### 不可违背的边界"
                  - generic [ref=e380]: 59 - 命名必须表达业务或领域语义
                  - generic [ref=e381]: 60 - 局部实现不得破坏整体体系一致性
                  - generic [ref=e382]: 61 - 禁止引入“只有作者能理解”的隐式约定
                  - generic [ref=e383]: "62"
                  - generic [ref=e384]:
                    - text: "63"
                    - generic [ref=e385]: "> **裁决说明**："
                  - generic [ref=e386]: 64 > 当个人偏好与系统一致性发生冲突时，以系统一致性为准。
                  - generic [ref=e387]: "65"
                  - text: 66 ---
                  - generic [ref=e388]: "67"
                  - generic [ref=e389]: "68 ## IV. 分层防御，用户友好"
                  - generic [ref=e390]: 69 **Layered Defense, User-Friendly（NON-NEGOTIABLE）**
                  - generic [ref=e391]: "70"
                  - generic [ref=e392]: "71 ### 裁决原则"
                  - generic [ref=e393]: 72 - 系统稳定性优先于功能完整性
                  - generic [ref=e394]: 73 - 用户可理解性优先于技术精确性
                  - generic [ref=e395]: "74"
                  - generic [ref=e396]: "75 ### 不可违背的边界"
                  - generic [ref=e397]: 76 - 错误必须被分层捕获与处理
                  - generic [ref=e398]: 77 - 系统不得以“静默失败”作为默认策略
                  - generic [ref=e399]: 78 - 单点错误不得导致系统级崩溃
                  - generic [ref=e400]: "79"
                  - generic [ref=e401]:
                    - text: "80"
                    - generic [ref=e402]: "> **裁决说明**："
                  - generic [ref=e403]: 81 > 当实现复杂度与系统韧性发生冲突时，必须选择系统韧性。
                  - generic [ref=e404]: "82"
                  - text: 83 ---
                  - generic [ref=e405]: "84"
                  - generic [ref=e406]: "85 ## V. 单一数据源"
                  - generic [ref=e407]: 86 **Single Source of Truth（NON-NEGOTIABLE）**
                  - generic [ref=e408]: "87"
                  - generic [ref=e409]: "88 ### 裁决原则"
                  - generic [ref=e410]: 89 - 状态集中管理
                  - generic [ref=e411]: 90 - 数据来源唯一
                  - generic [ref=e412]: 91 - 派生而非复制
                  - generic [ref=e413]: "92"
                  - generic [ref=e414]: "93 ### 不可违背的边界"
                  - generic [ref=e415]: 94 - 不允许多个权威来源描述同一事实
                  - generic [ref=e416]: 95 - 表现层不得成为事实裁决者
                  - generic [ref=e417]: 96 - 所有状态变化必须可追踪、可审计
                  - generic [ref=e418]: "97"
                  - text: 98 ---
                  - generic [ref=e419]: "99"
                  - generic [ref=e420]: "100 ## VI. 关注点分离"
                  - generic [ref=e421]: 101 **Separation of Concerns（NON-NEGOTIABLE）**
                  - generic [ref=e422]: "102"
                  - generic [ref=e423]: "103 ### 裁决原则"
                  - generic [ref=e424]: 104 - 每一层只解决一个问题
                  - generic [ref=e425]: 105 - 层与层通过明确契约协作
                  - generic [ref=e426]: "106"
                  - generic [ref=e427]: "107 ### 不可违背的边界"
                  - generic [ref=e428]: 108 - 领域逻辑不得渗透进展示或交互层
                  - generic [ref=e429]: 109 - 基础设施、业务规则、表现逻辑不得混杂
                  - generic [ref=e430]: "110"
                  - generic [ref=e431]:
                    - text: "111"
                    - generic [ref=e432]: "> **裁决说明**："
                  - generic [ref=e433]: 112 > 当“减少抽象层级”和“职责清晰”发生冲突时，必须选择职责清晰。
                  - generic [ref=e434]: "113"
                  - text: 114 ---
                  - generic [ref=e435]: "115"
                  - generic [ref=e436]: "116 ## VII. 可测试性优先"
                  - generic [ref=e437]: 117 **Testability-First（NON-NEGOTIABLE）**
                  - generic [ref=e438]: "118"
                  - generic [ref=e439]: "119 ### 裁决原则"
                  - generic [ref=e440]: 120 - 可验证性是设计质量的一部分
                  - generic [ref=e441]: 121 - 不可测试的实现视为不完整
                  - generic [ref=e442]: "122"
                  - generic [ref=e443]: "123 ### 不可违背的边界"
                  - generic [ref=e444]: 124 - 核心业务逻辑必须可被自动化验证
                  - generic [ref=e445]: 125 - 关键用户路径必须具备端到端验证能力
                  - generic [ref=e446]: "126"
                  - generic [ref=e447]:
                    - text: "127"
                    - generic [ref=e448]: "> **裁决说明**："
                  - generic [ref=e449]: 128 > 当设计导致难以测试时，必须重构设计，而不是削弱测试。
                  - generic [ref=e450]: "129"
                  - text: 130 ---
                  - generic [ref=e451]: "131"
                  - generic [ref=e452]: "132 ## VIII. 技术裁决权"
                  - generic [ref=e453]: 133 **Technology Decisions（NON-NEGOTIABLE）**
                  - generic [ref=e454]: "134"
                  - generic [ref=e455]: "135 ### 裁决原则"
                  - generic [ref=e456]: 136 - 技术选择必须服务于长期可维护性
                  - generic [ref=e457]: 137 - 不得引入平行技术体系制造分裂
                  - generic [ref=e458]: "138"
                  - generic [ref=e459]: "139 ### 不可违背的边界"
                  - generic [ref=e460]: 140 - 项目级技术裁决必须显式声明
                  - generic [ref=e461]: 141 - 未经治理流程，不得随意替换核心技术路线
                  - generic [ref=e462]: "142"
                  - generic [ref=e463]:
                    - text: "143"
                    - generic [ref=e464]: "> **说明**："
                  - generic [ref=e465]: 144 > 具体技术栈由各项目在其自身规范中声明，但必须服从本宪法。
                  - generic [ref=e466]: "145"
                  - text: 146 ---
                  - generic [ref=e467]: "147"
                  - generic [ref=e468]: "148 ## IX. 文档语言裁决"
                  - generic [ref=e469]: 149 **Documentation Language Policy（NON-NEGOTIABLE）**
                  - generic [ref=e470]: "150"
                  - generic [ref=e471]: "151 ### 裁决原则"
                  - generic [ref=e472]: 152 - 清晰理解 **优先于** 工具默认行为
                  - generic [ref=e473]: 153 - 团队共识 **优先于** 外部惯例
                  - generic [ref=e474]: "154"
                  - generic [ref=e475]: "155 ### 不可违背的边界"
                  - generic [ref=e476]: 156 - 团队内部规范性文档默认使用 **团队主语言**
                  - generic [ref=e477]: 157 - 关键技术术语可保留原语言，但必须提供语义说明
                  - generic [ref=e478]: "158"
                  - generic [ref=e479]: "159 ### 例外说明"
                  - generic [ref=e480]: 160 - 对外文档或跨语言协作场景
                  - text: 161 可根据受众选择单语或双语形式
