                - code [ref=e123]: Constitution
                - text: 。
              - paragraph [ref=e124]: 这一次的问题刚好相反：内容非常多、非常具体，但读起来像一份**"开发手册"**，而不是"宪法"。
              - paragraph [ref=e125]:
                - text: 我真正困惑的是：如果这些都是
                - code [ref=e126]: Constitution
                - text: ，那
                - code [ref=e127]: rules
                - text: 和各种配置文件又是什么？界限在哪里？
              - separator [ref=e128]
              - heading "四、真正想明白，是在我换了一个问题之后" [level=2] [ref=e129]
              - paragraph [ref=e130]:
