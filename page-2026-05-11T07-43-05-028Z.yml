            - generic [ref=e49]:
              - paragraph [ref=e50]: 很多人在用 Spec-Kit 的时候，都会有一种相似的感觉：
              - paragraph [ref=e51]: "\"流程看起来挺清楚，但我一上来就有点不知道该从哪下手。\""
