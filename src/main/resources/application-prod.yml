spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tradingdiary?useSSL=true&serverTimezone=UTC&characterEncoding=utf8mb4}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:tradingdiary}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    com.tradingdiary: INFO
    org.flywaydb: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  auto-login:
    enabled: false
