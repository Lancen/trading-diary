spring:
  flyway:
    enabled: false

logging:
  level:
    com.tradingdiary.mapper: DEBUG

springdoc:
  api-docs:
    enabled: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:test-secret-key-for-unit-tests-min-256-bits}
    access-expiration: 900
    refresh-expiration: 604800
  init:
    admin-password: ${APP_INIT_ADMIN_PASSWORD:admin123}
  auto-login:
    enabled: false
