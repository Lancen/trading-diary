spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  flyway:
    enabled: false

logging:
  level:
    com.tradingdiary.mapper: DEBUG

springdoc:
  api-docs:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-min-256-bits
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  auto-login:
    enabled: false
