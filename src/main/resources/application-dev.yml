spring:
  datasource:
    url: jdbc:h2:mem:tradingdiary;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.tradingdiary.mapper: DEBUG
    org.flywaydb: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  jwt:
    secret: dev-secret-key-change-in-production-min-256-bits-long
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  auto-login:
    enabled: true
