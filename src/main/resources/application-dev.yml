logging:
  level:
    com.tradingdiary.mapper: DEBUG
    org.flywaydb: DEBUG

aktools:
  base-url: http://127.0.0.1:8081

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  jwt:
    secret: ${app.jwt.secret}
    access-expiration: 900
    refresh-expiration: 604800
  init:
    admin-password: ${app.init.admin-password}
  auto-login:
    enabled: true
    username: admin
